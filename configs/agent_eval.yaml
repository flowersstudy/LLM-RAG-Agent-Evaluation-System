# Agent evaluation with DeepSeek-chat
experiment_id: agent_baseline
description: "Agent evaluation — deepseek-chat with mock tools"

models:
  - deepseek-chat

metrics:
  - task_success
  - tool_selection_accuracy
  - reasoning_trace_coherence

dataset_path: data/samples/agent_tasks_50.json
random_seed: 42
llm_judge_model: deepseek-chat
max_tasks: 50
max_agent_steps: 10

model_params:
  deepseek-chat:
    base_url: https://api.deepseek.com/v1
    env_prefix: DEEPSEEK

judge_params:
  base_url: https://api.deepseek.com/v1
  env_prefix: DEEPSEEK
